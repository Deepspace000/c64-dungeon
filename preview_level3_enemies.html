<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; gap: 40px; font-family: sans-serif;}
  .container { display: flex; gap: 40px; align-items: center; }
  .enemy { text-align: center; }
  canvas { width: 120px; height: 180px; image-rendering: pixelated; }
</style>
</head>
<body>
    
    <div class="container">
        <div class="enemy">
            <h3>Level 3 Ghoul</h3>
            <canvas id="c-ghoul" width="40" height="60"></canvas>
        </div>
        <div class="enemy">
            <h3>Level 3 Giant Spider</h3>
            <canvas id="c-spider" width="40" height="60"></canvas>
        </div>
    </div>

<script>
  const skel = new Image();
  skel.src = 'c64_skeleton.png';
  
  const spiderSVG = `
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
      <!-- Body -->
      <ellipse cx="20" cy="22" rx="8" ry="12" fill="#222222" />
      <ellipse cx="20" cy="10" rx="4" ry="4" fill="#111111" />
      
      <!-- Eyes -->
      <circle cx="18" cy="9" r="1" fill="#FF0000" />
      <circle cx="22" cy="9" r="1" fill="#FF0000" />
      <circle cx="16" cy="10" r="0.8" fill="#FF0000" />
      <circle cx="24" cy="10" r="0.8" fill="#FF0000" />

      <!-- Legs Left -->
      <path d="M 18 10 L 8 4 L 2 12" fill="none" stroke="#222222" stroke-width="2"/>
      <path d="M 17 14 L 5 12 L 0 20" fill="none" stroke="#222222" stroke-width="2"/>
      <path d="M 16 18 L 4 22 L 2 32" fill="none" stroke="#222222" stroke-width="2"/>
      <path d="M 16 22 L 8 30 L 8 38" fill="none" stroke="#222222" stroke-width="2"/>

      <!-- Legs Right -->
      <path d="M 22 10 L 32 4 L 38 12" fill="none" stroke="#222222" stroke-width="2"/>
      <path d="M 23 14 L 35 12 L 40 20" fill="none" stroke="#222222" stroke-width="2"/>
      <path d="M 24 18 L 36 22 L 38 32" fill="none" stroke="#222222" stroke-width="2"/>
      <path d="M 24 22 L 32 30 L 32 38" fill="none" stroke="#222222" stroke-width="2"/>
      
      <!-- Fangs -->
      <path d="M 18 13 L 19 16 L 20 13 Z" fill="#BBBBBB" />
      <path d="M 22 13 L 21 16 L 20 13 Z" fill="#BBBBBB" />
  </svg>
  `;
  const spiderImg = new Image();
  spiderImg.src = 'data:image/svg+xml;base64,' + btoa(spiderSVG);

  Promise.all([
    new Promise(r => skel.onload = r),
    new Promise(r => spiderImg.onload = r)
  ]).then(() => {
    // Drawn Ghoul
    const ctxGhoul = document.getElementById('c-ghoul').getContext('2d');
    ctxGhoul.filter = 'sepia(1) hue-rotate(90deg) saturate(2) brightness(0.8)';
    ctxGhoul.drawImage(skel, 0, 0, 40, 60);

    // Draw Spider (Spiders are wider, so we draw it centered)
    const ctxSpider = document.getElementById('c-spider').getContext('2d');
    ctxSpider.drawImage(spiderImg, 0, 10, 40, 40);
  });
</script>
</body>
</html>

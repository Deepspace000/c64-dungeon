<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloaked Skeleton Preview</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: monospace;
        }
        .skeleton {
            width: 300px;
            image-rendering: pixelated;
            filter: brightness(0.6) sepia(1) hue-rotate(220deg) saturate(3);
        }
    </style>
</head>
<body>
    <h1>Level 3 Cloaked Skeleton</h1>
    <img src="c64_skeleton.png" class="skeleton" alt="Cloaked Skeleton">
</body>
</html>
